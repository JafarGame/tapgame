<!DOCTYPE html>
<html>
<head>
  <title>VELTIX Game</title>
  <style>
    body {
      text-align:center;
      font-family:sans-serif;
      background:#020617;
      color:white;
    }
    #coin { font-size:40px; margin:20px; }
    button {
      margin:5px;
      padding:10px 20px;
      border-radius:10px;
      border:none;
      background:#00f0ff;
      color:black;
      font-weight:bold;
    }
    #loader {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
    }
  </style>
</head>
<body>

<div id="loader">Loading...</div>

<h2>VELTIX</h2>
<p id="userName"></p>

<div id="coin">0</div>
<div id="level">Level: 1</div>

<button onclick="tap()">TAP</button>
<button onclick="upgrade()">Upgrade</button>
<button onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCU5JdLURDc23XCZPZU49EIc_BdNgllsno",
  authDomain: "veltix-game.firebaseapp.com",
  projectId: "veltix-game"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user || !user.emailVerified) {
    window.location.href = "/login.html";
    return;
  }

  document.getElementById("loader").style.display = "none";
  document.getElementById("userName").innerText = user.email;

  startGame(user.email);
});

// 🎮 GAME
function startGame(user) {
  let coin = parseInt(localStorage.getItem(user+"_coin")) || 0;
  let level = parseInt(localStorage.getItem(user+"_level")) || 1;

  function update() {
    document.getElementById("coin").innerText = coin;
    document.getElementById("level").innerText = "Level: " + level;
  }

  window.tap = function () {
    coin++;
    save();
    update();
  };

  window.upgrade = function () {
    if (coin >= 10) {
      coin -= 10;
      level++;
      save();
      update();
    }
  };

  function save() {
    localStorage.setItem(user+"_coin", coin);
    localStorage.setItem(user+"_level", level);
  }

  update();
}

// 🔓 LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "/login.html";
  });
};
</script>

</body>
</html>
