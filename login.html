<!DOCTYPE html>
<html>
<head>
  <title>VELTIX Auth</title>
  <style>
    body {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#020617;
      color:white;
      font-family:sans-serif;
    }
    .card {
      padding:30px;
      border-radius:20px;
      background:#111;
      width:300px;
      text-align:center;
    }
    input, button {
      width:100%;
      padding:10px;
      margin:8px 0;
      border-radius:10px;
      border:none;
    }
    button {
      background:#00f0ff;
      color:black;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>VELTIX</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="password2" type="password" placeholder="Repeat Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "SENING API KEYNI TO‘LIQ QO‘Y!",
  authDomain: "veltix-game.firebaseapp.com",
  projectId: "veltix-game"
});

const auth = getAuth(app);

// 🔐 Auto login
onAuthStateChanged(auth, (user) => {
  if (user && user.emailVerified) {
    window.location.href = "/index.html";
  }
});

// 🔑 LOGIN
window.login = function () {
  let email = val("email");
  let pass = val("password");

  signInWithEmailAndPassword(auth, email, pass)
    .then(res => {
      if (!res.user.emailVerified) {
        alert("Email tasdiqlanmagan!");
        return;
      }
      window.location.href = "/index.html";
    })
    .catch(e => alert(e.message));
};

// 🆕 REGISTER
window.register = function () {
  let email = val("email");
  let pass = val("password");
  let pass2 = val("password2");

  if (pass !== pass2) {
    alert("Parollar mos emas!");
    return;
  }

  createUserWithEmailAndPassword(auth, email, pass)
    .then(res => {
      sendEmailVerification(res.user);
      alert("Emailga tasdiqlash link yuborildi!");
    })
    .catch(e => alert(e.message));
};

function val(id){
  return document.getElementById(id).value;
}
</script>

</body>
</html>
