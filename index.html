<!DOCTYPE html>
<html>
<head>
  <title>Tap Coin Game</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-top: 30px;
    }

    #coin {
      font-size: 40px;
      margin: 20px;
    }

    button {
      font-size: 30px;
      padding: 15px 30px;
      border-radius: 15px;
      border: none;
      background: orange;
      color: white;
    }
  </style>
</head>

<body>

<h1>💰 Tap Coin Game</h1>

<div id="coin">0</div>
<div id="level">Level: 1</div>
<button onclick="tap()">🔥 TAP</button>

<script>
let coin = localStorage.getItem("coin") || 0;
coin = parseInt(coin);

let level = localStorage.getItem("level") || 1;
level = parseInt(level);

updateUI();

function tap() {
  coin += level; // levelga qarab ko‘p coin beradi
  saveData();
  updateUI();
}

function updateUI() {
  document.getElementById("coin").innerText = coin;
  
  // level hisoblash
  if (coin >= 50) {
    level = 3;
  } else if (coin >= 10) {
    level = 2;
  } else {
    level = 1;
  }

  document.getElementById("level").innerText = "Level: " + level;
}

function saveData() {
  localStorage.setItem("coin", coin);
  localStorage.setItem("level", level);
}
</script>

</body>
                  </html>
