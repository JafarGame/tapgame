<!DOCTYPE html>
<html>
<head>
  <title>VELTIX Auth</title>
  <style>
    body {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#020617;
      color:white;
      font-family:sans-serif;
    }
    .card {
      padding:30px;
      border-radius:20px;
      background:#111;
      text-align:center;
    }
    input, button {
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
      border:none;
    }
    button {
      background:#00f0ff;
      color:black;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>VELTIX</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCU5JdLURDc23XCZPZU49EIc_BdNgllsno",
  authDomain: "veltix-game.firebaseapp.com",
  projectId: "veltix-game"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 Auto login
onAuthStateChanged(auth, (user) => {
  if (user && user.emailVerified) {
    window.location.href = "/index.html";
  }
});

// 🔑 LOGIN
window.login = function () {
  let email = emailInput();
  let password = passInput();

  signInWithEmailAndPassword(auth, email, password)
    .then((cred) => {
      if (!cred.user.emailVerified) {
        alert("Email tasdiqlanmagan!");
        return;
      }
      window.location.href = "/index.html";
    })
    .catch(err => alert(err.message));
};

// 🆕 REGISTER
window.register = function () {
  let email = emailInput();
  let password = passInput();

  createUserWithEmailAndPassword(auth, email, password)
    .then((cred) => {
      sendEmailVerification(cred.user);
      alert("Emailga link yuborildi!");
    })
    .catch(err => alert(err.message));
};

function emailInput() {
  return document.getElementById("email").value;
}
function passInput() {
  return document.getElementById("password").value;
}
</script>

</body>
</html>
