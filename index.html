<!DOCTYPE html>
<html>
<head>
  <title>My First Game</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h1>Coin: <span id="coin">0</span></h1>
<button onclick="tap()" style="font-size:30px;">TAP</button>

<script>
let coin = 0;

function tap(){
  coin++;
  document.getElementById("coin").innerText = coin;
}
</script>

</body>
</html>
