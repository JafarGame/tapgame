<!DOCTYPE html>
<html>
<head>
  <title>VELTIX Login</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      background: radial-gradient(circle at top, #020617, #000);
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,255,0.2);
      border-radius: 20px;
      padding: 30px;
      width: 280px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,255,255,0.2);
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      box-shadow: 0 0 25px gold;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: #aaa;
    }

    .passwordBox {
      position: relative;
    }

    .eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #00f0ff, #0066ff);
      color: white;
      font-weight: bold;
      box-shadow: 0 0 15px #00f0ff;
      cursor: pointer;
    }

    h2 {
      color: #00f0ff;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 15px;
    }

    /* 🔥 NEW LOADING */
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .loaderLogo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 40px gold;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

  </style>
</head>

<body>

<!-- 🔥 NEW LOADING -->
<div id="loadingScreen">
  <div style="text-align:center;">
    <img src="logoveltix.png" class="loaderLogo">
    <p>Loading...</p>
  </div>
</div>

<!-- LOGIN CARD -->
<div class="card">
  <img src="logoveltix.png" class="logo">
  <h2>VELTIX</h2>
  <div class="subtitle">Tap & VLX</div>

  <input id="username" placeholder="Login">

  <div class="passwordBox">
    <input id="password" type="password" placeholder="Password">
    <span class="eye" onclick="togglePassword()">👁</span>
  </div>

  <button onclick="login()">🚀 Kirish</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCU5JdLURDc23XCZPZU49EIc_BdNgllsno",
  authDomain: "veltix-game.firebaseapp.com",
  projectId: "veltix-game",
  storageBucket: "veltix-game.firebasestorage.app",
  messagingSenderId: "320598350844",
  appId: "1:320598350844:web:becf1ca122dbe1fe073079",
  measurementId: "G-9L7DL8VR5P"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  let email = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Email va parol kiriting!");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "/index.html";
    })
    .catch(() => {
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "/index.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    });7
</script>
</body>
</html>
