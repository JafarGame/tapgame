<!DOCTYPE html>
<html>
<head>
  <title>Tap Coin Game</title>
  <style>
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .pop {
      animation: pop 0.2s ease;
    }
    body {
      text-align: center;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }
    #coin {
      font-size: 40px;
      margin: 20px;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: orange;
      color: white;
    }
  </style>
</head>
<body>
<h1>💰 Tap Coin Game</h1>
<button id="helpBtn" onclick="openHelp()">❓</button>
<div id="coin">0</div>
<div id="level">Level: 1</div>
<button onclick="tap(event)">🔥 TAP</button>
<button onclick="upgrade()">⚡ Upgrade (<span id="upgradeCost">50</span>)</button>
<div id="money">Pul: $0</div>
<h2>🛒 Shop</h2>
<button onclick="buyDouble()">💎 Double Tap (500)</button>
<button onclick="withdraw()">💸 Withdraw (5000)</button>
#helpBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 20px;
  padding: 5px 10px;
  border-radius: 50%;
  background: gold;
  color: black;
}
<div id="helpModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000000cc;">
  <div style="background:white; color:black; padding:20px; margin:50px; border-radius:10px; max-height:80%; overflow:auto;">
    <button onclick="closeHelp()">❌ Yopish</button>
    <h2>📖 Qo‘llanma</h2>
    <select onchange="changeLang(this.value)">
      <option value="uz">O‘zbek</option>
      <option value="ru">Русский</option>
      <option value="en">English</option>
      <option value="tr">Türkçe</option>
    </select>
    <div id="helpText"></div>
  </div>
</div>
<script>
// 🔥 LOAD DATA
let coin = parseInt(localStorage.getItem("coin")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;
let money = parseInt(localStorage.getItem("money")) || 0;
let upgradeCost = level * 1000;
let doubleTap = false;
// 🔥 TAP
function tap(event) {
  let tapCoin = Math.floor((level - 1) / 10) + 1;
  if (doubleTap) tapCoin *= 2;
  coin += tapCoin;
  let coinImg = document.createElement("img");
  coinImg.src = "https://cdn-icons-png.flaticon.com/512/138/138292.png";
  coinImg.style.position = "absolute";
  coinImg.style.left = event.clientX + "px";
  coinImg.style.top = event.clientY + "px";
  coinImg.style.width = "30px";
  document.body.appendChild(coinImg);
  setTimeout(() => {
    coinImg.style.top = (event.clientY - 80) + "px";
    coinImg.style.opacity = "0";
  }, 50);
  setTimeout(() => coinImg.remove(), 1000);
  let coinEl = document.getElementById("coin");
  coinEl.classList.add("pop");
  setTimeout(() => {
    coinEl.classList.remove("pop");
  }, 200);
  updateUI();
  saveData(); // 🔥 ENG MUHIM
}
// 🔥 AUTO COIN (10 sekund)
function getAutoCoin() {
  return Math.floor((level - 1) / 50) + 1;
}
setInterval(() => {
  coin += getAutoCoin();
  updateUI();
  saveData();
}, 10000);
// 🔥 UPGRADE
function upgrade() {
  if (coin >= upgradeCost) {
    coin -= upgradeCost;
    level++;
    // 🔥 YANGI NARX FORMULA
    upgradeCost = level * 1000;
    updateUI();
    saveData();
  } else {
    alert("Coin yetarli emas!");
  }
}
// 💰 WITHDRAW
function withdraw() {
  if (coin >= 5000) {
    coin -= 5000;
    money += 1;
    updateUI();
    saveData();
  } else {
    alert("5000 coin kerak!");
  }
}
// 💎 DOUBLE TAP (10 sekund)
function buyDouble() {
  if (coin >= 500) {
    coin -= 500;
    doubleTap = true;
    setTimeout(() => {
      doubleTap = false;
    }, 10000);
    updateUI();
    saveData();
  } else {
    alert("Coin yetarli emas!");
  }
}
// 🔄 UI
function updateUI() {
  document.getElementById("coin").innerText = coin;
  document.getElementById("level").innerText = "Level: " + level;
  document.getElementById("money").innerText = "Pul: $" + money;
  document.getElementById("upgradeCost").innerText = upgradeCost;
}
// 💾 SAVE
function saveData() {
  localStorage.setItem("coin", coin);
  localStorage.setItem("level", level);
  localStorage.setItem("money", money);
  localStorage.setItem("upgradeCost", upgradeCost);
}
// 🔥 START
updateUI();
function openHelp() {
  document.getElementById("helpModal").style.display = "block";
  changeLang("uz");
}

function closeHelp() {
  document.getElementById("helpModal").style.display = "none";
}
function changeLang(lang) {
  let text = "";

  if (lang === "uz") {
    text = `
    <b>🎮 O‘yin haqida:</b><br>
    Siz TAP bosib coin yig‘asiz.<br><br>

    <b>📈 Level:</b><br>
    Har level oshganda kuchayadi.<br>
    Level narxi = level × 1000 coin.<br><br>

    <b>👆 Tap daromadi:</b><br>
    Har 10 levelda +1 coin qo‘shiladi.<br><br>

    <b>⏱ Auto coin:</b><br>
    Har 10 sekundda coin keladi.<br>
    Har 50 levelda auto coin +1 oshadi.
    `;
  }

  if (lang === "ru") {
    text = `
    <b>🎮 Об игре:</b><br>
    Нажимайте TAP и зарабатывайте монеты.<br><br>

    <b>📈 Уровни:</b><br>
    Цена уровня = уровень × 1000 монет.<br><br>

    <b>👆 Доход за тап:</b><br>
    Каждые 10 уровней +1 монета.<br><br>

    <b>⏱ Авто доход:</b><br>
    Каждые 10 секунд даётся монета.<br>
    Каждые 50 уровней +1.
    `;
  }

  if (lang === "en") {
    text = `
    <b>🎮 About the game:</b><br>
    Tap to earn coins.<br><br>

    <b>📈 Levels:</b><br>
    Upgrade cost = level × 1000 coins.<br><br>

    <b>👆 Tap income:</b><br>
    Every 10 levels = +1 coin per tap.<br><br>

    <b>⏱ Auto income:</b><br>
    Every 10 seconds coins are added.<br>
    Every 50 levels = +1 coin.
    `;
  }

  if (lang === "tr") {
    text = `
    <b>🎮 Oyun hakkında:</b><br>
    TAP basarak coin kazan.<br><br>

    <b>📈 Seviye:</b><br>
    Seviye maliyeti = seviye × 1000 coin.<br><br>

    <b>👆 Tap kazancı:</b><br>
    Her 10 seviyede +1 coin.<br><br>

    <b>⏱ Otomatik gelir:</b><br>
    Her 10 saniyede coin gelir.<br>
    Her 50 seviyede +1 coin.
    `;
  }

  document.getElementById("helpText").innerHTML = text;
}
</script>
</body>
</html>
