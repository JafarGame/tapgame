<!DOCTYPE html>
<html>
<head>
  <title>VELTIX Login</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      background: radial-gradient(circle at top, #020617, #000);
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,255,0.2);
      border-radius: 20px;
      padding: 30px;
      width: 280px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,255,255,0.2);
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin-bottom: 15px;
      box-shadow: 0 0 25px gold;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #00f0ff, #0066ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #loading {
      display: none;
      margin-top: 10px;
      color: #00f0ff;
    }
  </style>
</head>

<body>

<div class="card">
  <img src="logoveltix.png" class="logo">
  <h2>VELTIX</h2>

  <!-- 🔥 EMAIL -->
  <input id="email" type="email" placeholder="Email kiriting">

  <!-- 🔐 PASSWORD -->
  <input id="password" type="password" placeholder="Parol">

  <button onclick="login()">🚀 Kirish</button>

  <div id="loading">Loading...</div>
</div>

<script type="module">

import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  projectId: "veltix-game",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  if (!email || !password) {
    alert("Email va parol kiriting!");
    return;
  }
  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      const user = userCredential.user;
      if (!user.emailVerified) {
        alert("Email tasdiqlanmagan! Emailingizni tekshiring.");
        return;
      }
      window.location.href = "/index.html";
    })
    .catch(() => {

          alert("Emailingizga tasdiqlash link yuborildi! Tekshiring.");
        })
        .catch((error) => {
          alert(error.message);
        });
    });
</script>

</body>
</html>
