<!DOCTYPE html>
<html>
<head>
  <title>Tap Coin Game</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-top: 30px;
    }

    #coin {
      font-size: 40px;
      margin: 20px;
    }

    button {
      font-size: 30px;
      padding: 15px 30px;
      border-radius: 15px;
      border: none;
      background: orange;
      color: white;
    }
  </style>
</head>

<body>

<h1>💰 Tap Coin Game</h1>

<div id="coin">0</div>
<div id="level">Level: 1</div>
<button onclick="tap()">🔥 TAP</button>
<button onclick="upgrade()">⚡ Upgrade (50)</button>
<script>
let coin = localStorage.getItem("coin") || 0;
coin = parseInt(coin);

let level = localStorage.getItem("level") || 1;
level = parseInt(level);

updateUI();

// TAP
function tap() {
  coin += level;
  saveData();
  updateUI();
}

// AUTO COIN
setInterval(() => {
  coin += level;
  saveData();
  updateUI();
}, 1000);

// UPGRADE
function upgrade() {
  if (coin >= 50) {
    coin -= 50;
    level++;
    saveData();
    updateUI();
  } else {
    alert("Coin yetarli emas!");
  }
}

// UI
function updateUI() {
  document.getElementById("coin").innerText = coin;
  document.getElementById("level").innerText = "Level: " + level;
}

// SAVE
function saveData() {
  localStorage.setItem("coin", coin);
  localStorage.setItem("level", level);
}
</script>

</body>
                  </html>
