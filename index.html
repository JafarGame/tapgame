<!DOCTYPE html>
<html>
<head>
<title>VELTIX Game</title>

<style>
body {
  margin:0;
  text-align:center;
  font-family:sans-serif;
  background:radial-gradient(circle,#020617,#000);
  color:white;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.card {
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin:20px;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  background:linear-gradient(45deg,#00f0ff,#0066ff);
  color:white;
}

.tapBtn {
  background:gold;
  color:black;
  font-weight:bold;
}

#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.spin {
  width:120px;
  animation:spin 5s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div id="loader">
  <img src="logoveltix.png" class="spin">
</div>

<div class="header">
  <h2>VELTIX</h2>
  <div>
    <span id="userName"></span>
    <button onclick="logout()">🚪</button>
  </div>
</div>

<div class="card">
  <h1 id="coin">0</h1>
  <p>VELTIX (VLX)</p>
  <p id="level">Level: 1</p>
</div>

<button class="tapBtn" onclick="tap()">⚡ TAP</button>
<button onclick="upgrade()">Upgrade (<span id="cost">1000</span>)</button>

<div class="card">
  <p id="money">$0</p>
</div>

<!-- HELP -->
<button onclick="openHelp()">❓ Help</button>

<div id="help" style="display:none;background:black;position:fixed;width:100%;height:100%;">
  <button onclick="closeHelp()">❌</button>
  <select onchange="lang(this.value)">
    <option value="uz">O‘zbek</option>
    <option value="ru">Русский</option>
    <option value="en">English</option>
    <option value="tr">Türkçe</option>
  </select>
  <div id="text"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "SENING_API_KEY",
  authDomain: "veltix-game.firebaseapp.com",
  projectId: "veltix-game"
});

const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href="/login.html";
    return;
  }

  document.getElementById("loader").style.display="none";
  document.getElementById("userName").innerText=user.email;

  start(user.email);
});

function start(u){
  let coin=+localStorage.getItem(u+"_coin")||0;
  let level=+localStorage.getItem(u+"_level")||1;

  function save(){
    localStorage.setItem(u+"_coin",coin);
    localStorage.setItem(u+"_level",level);
  }

  function ui(){
    document.getElementById("coin").innerText=coin;
    document.getElementById("level").innerText="Level "+level;
    document.getElementById("cost").innerText=level*1000;
  }

  window.tap=()=>{
    coin++;
    ui(); save();
  };

  window.upgrade=()=>{
    let c=level*1000;
    if(coin>=c){
      coin-=c; level++;
      ui(); save();
    }
  };

  ui();
}

window.logout=()=>{
  signOut(auth).then(()=>{
    localStorage.clear();
    window.location.href="/login.html";
  });
};
</script>

<script>
function openHelp(){
  document.getElementById("help").style.display="block";
  lang("uz");
}
function closeHelp(){
  document.getElementById("help").style.display="none";
}

function lang(l){
  let t="";
  if(l=="uz") t="Tap bosib coin yig‘asiz";
  if(l=="ru") t="Нажимай и получай монеты";
  if(l=="en") t="Tap to earn coins";
  if(l=="tr") t="TAP bas coin kazan";

  document.getElementById("text").innerHTML=t;
}
</script>

</body>
</html>
