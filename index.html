<!DOCTYPE html>
<html>
<head>
  <title>Tap Coin Game</title>

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: radial-gradient(circle at top, #020617, #000);
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
    }

    #userName {
      color: #94a3b8;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #00f0ff, #0066ff);
      color: white;
      margin: 5px;
    }

    .tapBtn {
      background: gold;
      color: black;
      font-weight: bold;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px;
      margin: 20px;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .spin {
      width: 120px;
      animation: spin 5s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader">
  <img src="logoveltix.png" class="spin">
</div>

<!-- HEADER -->
<div class="header">
  <h2>VELTIX</h2>
  <div>
    <span id="userName"></span>
    <button onclick="logout()">🚪</button>
  </div>
</div>

<!-- GAME -->
<div class="card">
  <h1 id="coin">0</h1>
  <p>VELTIX (VLX)</p>
  <p id="level">Level: 1</p>
</div>

<button class="tapBtn" onclick="tap()">⚡ TAP</button>
<button onclick="upgrade()">Upgrade (<span id="upgradeCost">1000</span>)</button>

<div class="card">
  <p id="money">Money: $0</p>
</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "SENING_API_KEY",
  authDomain: "veltix-game.firebaseapp.com",
  projectId: "veltix-game"
});

const auth = getAuth(app);

// 🔐 AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  document.getElementById("loader").style.display = "none";
  document.getElementById("userName").innerText = user.email;

  startGame(user.email);
});

// 🎮 GAME
function startGame(user) {
  let coin = parseInt(localStorage.getItem(user+"_coin")) || 0;
  let level = parseInt(localStorage.getItem(user+"_level")) || 1;
  let money = parseInt(localStorage.getItem(user+"_money")) || 0;

  function updateUI() {
    document.getElementById("coin").innerText = coin;
    document.getElementById("level").innerText = "Level: " + level;
    document.getElementById("money").innerText = "Money: $" + money;
    document.getElementById("upgradeCost").innerText = level * 1000;
  }

  function save() {
    localStorage.setItem(user+"_coin", coin);
    localStorage.setItem(user+"_level", level);
    localStorage.setItem(user+"_money", money);
  }

  window.tap = function () {
    coin++;
    updateUI();
    save();
  };

  window.upgrade = function () {
    let cost = level * 1000;
    if (coin >= cost) {
      coin -= cost;
      level++;
      updateUI();
      save();
    } else {
      alert("Coin yetarli emas!");
    }
  };

  setInterval(() => {
    coin++;
    updateUI();
    save();
  }, 10000);

  updateUI();
}

// 🔓 LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    localStorage.clear();
    window.location.href = "/login.html";
  });
};
</script>

</body>
</html>
