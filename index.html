<!DOCTYPE html>
<html>
<head>
  <title>Tap Coin Game</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-top: 30px;
    }

    #coin {
      font-size: 40px;
      margin: 20px;
    }

    button {
      font-size: 30px;
      padding: 15px 30px;
      border-radius: 15px;
      border: none;
      background: orange;
      color: white;
    }
  </style>
</head>

<body>

<h1>💰 Tap Coin Game</h1>

<div id="coin">0</div>

<button onclick="tap()">🔥 TAP</button>

<script>
let coin = localStorage.getItem("coin") || 0;
coin = parseInt(coin);

document.getElementById("coin").innerText = coin;

function tap() {
  coin++;
  document.getElementById("coin").innerText = coin;
  localStorage.setItem("coin", coin);
}
</script>

</body>
                  </html>
