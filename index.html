<!DOCTYPE html>
<html>
<head>
  <title>Tap Coin Game</title>
  <style>
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .pop {
      animation: pop 0.2s ease;
    }
    body {
      text-align: center;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }
    #coin {
      font-size: 40px;
      margin: 20px;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: orange;
      color: white;
    }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
}
.header button {
  margin-left: 5px;
}
#userName {
  font-size: 14px;
  color: #94a3b8;
}
#helpBtn {
  font-size: 18px;
  padding: 6px 10px;
  border-radius: 50%;
  background: gold;
  color: black;
}
/* 🪙 COIN EFFECT */
.coinEffect {
  position: absolute;
  width: 25px;
  pointer-events: none;
  animation: coinFly 1s ease-out forwards;
}

/* ➕ PLUS EFFECT */
.plusEffect {
  position: absolute;
  color: gold;
  font-weight: bold;
  font-size: 18px;
  pointer-events: none;
  animation: plusFly 1s ease-out forwards;
}

/* 🌀 AYLANA + UCHISH */
@keyframes coinFly {
  0% {
    transform: translateY(0) rotate(0deg) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-100px) rotate(720deg) scale(0.5);
    opacity: 0;
  }
}

/* ➕ PLUS ANIMATSIYA */
@keyframes plusFly {
  0% {
    transform: translateY(0);
    opacity: 1;
  }
  100% {
    transform: translateY(-80px);
    opacity: 0;
  }
}
    .card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 20px;
  padding: 20px;
  margin: 20px;
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
    }
button {
  background: linear-gradient(45deg, #00f0ff, #0066ff);
  border: none;
  border-radius: 15px;
  padding: 12px 20px;
  color: white;
  font-weight: bold;
  box-shadow: 0 0 15px #00f0ff;
}
body {
  background: radial-gradient(circle at top, #020617, #000);
}
    .tapBtn {
  font-size: 20px;
  padding: 15px 30px;
  background: linear-gradient(45deg, gold, orange);
  box-shadow: 0 0 20px gold;
}
  #loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  }
.spin {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  animation: spin 9s linear infinite;
  filter: drop-shadow(0 0 40px gold);
  border: 3px solid rgba(255,215,0,0.3);
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
  </style>
</head>
<body>
<div id="loader">
  <img src="https://raw.githubusercontent.com/JafarGame/tapgame/main/logoveltix.png" class="spin">
</div>
<div class="header">
  <div style="display:flex; align-items:center; gap:10px;">
    <img src="https://raw.githubusercontent.com/JafarGame/tapgame/main/logoveltix.png" width="35">
    <h2 style="margin:0; color:#00f0ff;">VELTIX</h2>
  </div>

  <div style="display:flex; align-items:center; gap:10px;">
    <span id="userName"></span>
    <button id="helpBtn" onclick="openHelp()">❓</button>
    <button onclick="logout()">🚪</button>
  </div>
</div>
<div class="card">
  <img src="https://raw.githubusercontent.com/JafarGame/tapgame/main/logoveltix.png" class="spin">
<div id="coin">0</div>
  <p>VELTIX (VLX)</p>
  <div id="level">Level: 1</div>
</div>
<button onclick="tap(event)" class="tapBtn">⚡ TAP</button>
<button onclick="upgrade()">⚡ Upgrade (<span id="upgradeCost">50</span>)</button>
<div class="card">
  <h3>💰 Balance</h3>
  <p id="money">Money: $0</p>
</div>
<div class="card">
  <h2>🛒 VELTIX Shop</h2>
  <button onclick="buyDouble()">💎 Double Tap</button>
  <button onclick="withdraw()">💱 Exchange</button>
</div>
<div id="helpModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000000cc;">
  <div style="background:white; color:black; padding:20px; margin:50px; border-radius:10px; max-height:80%; overflow:auto;">
    <button onclick="closeHelp()">❌ Yopish</button>
    <h2>📖 Qo‘llanma</h2>
    <select onchange="changeLang(this.value)">
      <option value="uz">O‘zbek</option>
      <option value="ru">Русский</option>
      <option value="en">English</option>
      <option value="tr">Türkçe</option>
    </select>
    <div id="helpText"></div>
  </div>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCU5JdLURDc23XCZPZU49EIc_BdNgllsno",
  authDomain: "veltix-game.firebaseapp.com",
  projectId: "veltix-game",
  storageBucket: "veltix-game.firebasestorage.app",
  messagingSenderId: "320598350844",
  appId: "1:320598350844:web:becf1ca122dbe1fe073079",
  measurementId: "G-9L7DL8VR5P"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "/login.html";
  } else {
    document.getElementById("userName").innerText = "👤 " + user.email;

    // 🔥 loader o‘chadi
    document.getElementById("loader").style.display = "none";

    startGame(user.email);
  }
});

// 🎮 GAME
function startGame(user) {
  let coin = parseInt(localStorage.getItem(user + "_coin")) || 0;
  let level = parseInt(localStorage.getItem(user + "_level")) || 1;
  let money = parseInt(localStorage.getItem(user + "_money")) || 0;
  let upgradeCost = level * 1000;
  let doubleTap = false;

  function updateUI() {
    document.getElementById("coin").innerText = coin;
    document.getElementById("level").innerText = "Level: " + level;
    document.getElementById("money").innerText = "Money: $" + money;
    document.getElementById("upgradeCost").innerText = upgradeCost;
  }

  function saveData() {
    localStorage.setItem(user + "_coin", coin);
    localStorage.setItem(user + "_level", level);
    localStorage.setItem(user + "_money", money);
  }

  window.tap = function () {
    let tapCoin = Math.floor((level - 1) / 10) + 1;
    if (doubleTap) tapCoin *= 2;

    coin += tapCoin;
    updateUI();
    saveData();
  };

  window.upgrade = function () {
    if (coin >= upgradeCost) {
      coin -= upgradeCost;
      level++;
      upgradeCost = level * 1000;
      updateUI();
      saveData();
    } else {
      alert("Coin yetarli emas!");
    }
  };

  window.withdraw = function () {
    if (coin >= 5000) {
      coin -= 5000;
      money += 1;
      updateUI();
      saveData();
    } else {
      alert("5000 coin kerak!");
    }
  };

  window.buyDouble = function () {
    if (coin >= 500) {
      coin -= 500;
      doubleTap = true;

      setTimeout(() => {
        doubleTap = false;
      }, 10000);

      updateUI();
      saveData();
    } else {
      alert("Coin yetarli emas!");
    }
  };

  setInterval(() => {
    coin += Math.floor((level - 1) / 50) + 1;
    updateUI();
    saveData();
  }, 10000);

  updateUI();
}

// 🔓 LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "/login.html";
  });
};
    <script>
function openHelp() {
  document.getElementById("helpModal").style.display = "block";
  changeLang("uz");
}

function closeHelp() {
  document.getElementById("helpModal").style.display = "none";
}

function changeLang(lang) {
  let text = "";

  if (lang === "uz") {
    text = `
    <b>🎮 O‘yin haqida:</b><br>
    TAP bosib coin yig‘asiz.<br><br>

    <b>📈 Level:</b><br>
    Level narxi = level × 1000 coin.<br><br>

    <b>👆 Tap:</b><br>
    Har 10 levelda +1 coin.<br><br>

    <b>⏱ Auto:</b><br>
    Har 10 sekund coin keladi.
    `;
  }

  if (lang === "ru") {
    text = `
    <b>🎮 Об игре:</b><br>
    Нажимай TAP и зарабатывай.<br><br>
    `;
  }

  if (lang === "en") {
    text = `
    <b>🎮 Game:</b><br>
    Tap to earn coins.<br><br>
    `;
  }

  if (lang === "tr") {
    text = `
    <b>🎮 Oyun:</b><br>
    TAP bas coin kazan.<br><br>
    `;
  }
  document.getElementById("helpText").innerHTML = text;
}
</script>
</body>
</html>
