<!DOCTYPE html>
<html>
<head>
  <title>VELTIX Game</title>

  <style>
    body {
      text-align:center;
      font-family:sans-serif;
      background:#020617;
      color:white;
    }

    #coin {
      font-size:40px;
      margin:20px;
    }

    button {
      margin:5px;
      padding:10px 20px;
      border-radius:10px;
      border:none;
      background:#00f0ff;
      color:black;
      font-weight:bold;
    }

    #loader {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    /* 🔥 LOGO */
    .logo {
      width:140px;
      height:140px;
      border-radius:50%;
      margin:20px auto;
      display:block;
      animation:spin 10s linear infinite;
      box-shadow:0 0 30px gold, 0 0 60px #00f0ff;
    }

    @keyframes spin {
      0% { transform:rotate(0deg); }
      100% { transform:rotate(360deg); }
    }

    /* 🪙 EFFECT */
    .coinEffect {
      position:absolute;
      width:30px;
      pointer-events:none;
      animation:coinFly 1s forwards;
    }

    .plusEffect {
      position:absolute;
      color:gold;
      font-weight:bold;
      font-size:20px;
      pointer-events:none;
      animation:plusFly 1s forwards;
    }

    @keyframes coinFly {
      0% { transform:translateY(0) scale(1); opacity:1; }
      100% { transform:translateY(-120px) scale(0.5); opacity:0; }
    }

    @keyframes plusFly {
      0% { transform:translateY(0); opacity:1; }
      100% { transform:translateY(-80px); opacity:0; }
    }

  </style>
</head>

<body>

<div id="loader">Loading...</div>

<h2>VELTIX</h2>
<img src="logoveltix.png" class="logo">

<p id="userName"></p>

<div id="coin">0</div>
<div id="level">Level: 1</div>

<button onclick="tap(event)">TAP</button>
<button onclick="upgrade()">Upgrade</button>
<button onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCU5JdLURDc23XCZPZU49EIc_BdNgllsno",
  authDomain: "veltix-game.firebaseapp.com",
  projectId: "veltix-game"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (!user || !user.emailVerified) {
    window.location.href = "/login.html";
    return;
  }

  document.getElementById("loader").style.display = "none";
  document.getElementById("userName").innerText = user.email;

  startGame(user.email);
});

// 🎮 GAME
function startGame(user) {

  let coin = parseInt(localStorage.getItem(user+"_coin")) || 0;
  let level = parseInt(localStorage.getItem(user+"_level")) || 1;

  function update() {
    document.getElementById("coin").innerText = coin;
    document.getElementById("level").innerText = "Level: " + level;
  }

  function save() {
    localStorage.setItem(user+"_coin", coin);
    localStorage.setItem(user+"_level", level);
  }

  window.tap = function(event) {
    let tapCoin = Math.floor((level - 1) / 10) + 1;

    coin += tapCoin;
    update();
    save();

    // 🪙 COIN
    let coinImg = document.createElement("img");
    coinImg.src = "logoveltix.png";
    coinImg.className = "coinEffect";
    coinImg.style.left = event.clientX + "px";
    coinImg.style.top = event.clientY + "px";

    document.body.appendChild(coinImg);
    setTimeout(() => coinImg.remove(), 1000);

    // ➕ TEXT
    let plus = document.createElement("div");
    plus.innerText = "+" + tapCoin;
    plus.className = "plusEffect";
    plus.style.left = event.clientX + "px";
    plus.style.top = event.clientY + "px";

    document.body.appendChild(plus);
    setTimeout(() => plus.remove(), 1000);
  };

  window.upgrade = function() {
    if (coin >= 10) {
      coin -= 10;
      level++;
      save();
      update();
    } else {
      alert("Coin yetarli emas!");
    }
  };

  update();
}

// 🚪 LOGOUT
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "/login.html";
  });
};
</script>

</body>
</html>
